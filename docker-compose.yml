version: '3.8'
services:
  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    ports:
      - "3001:3000"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/nodevault
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs

volumes:
  mongodb_data:
